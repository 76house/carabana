<!doctype html>
<html lang="cz">

  <head>

    <meta charset="utf-8"/>
    <title>{% block title %}čarabaňa.cz{% endblock title %}</title>

    <!--[if lt IE 9]>
      <link href="{{ STATIC_URL }}css/ie.css" media="screen, projection" rel="stylesheet" type="text/css" />
      <script type="text/javascript" src="{{ STATIC_URL }}js/html5.js"></script>
      <script src="http://html5shim.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link href="{{ STATIC_URL }}css/screen.css" media="screen, projection" rel="stylesheet" type="text/css" />
    <link href="{{ STATIC_URL }}css/print.css" media="print" rel="stylesheet" type="text/css" />
    <link href="{{ STATIC_URL }}favicon.ico" rel="shortcut icon" />
    <link href="http://feeds.feedburner.com/carabana" rel="alternate" type="application/rss+xml" title="carabana.cz RSS feed" />

    <!-- Adding "maximum-scale=1" fixes the Mobile Safari auto-zoom bug: http://filamentgroup.com/examples/iosScaleBug/ -->
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
{% comment %}
    <!-- jQuery LOCAL VERSION ================================================ -->
    <!--script src="js/jquery.min.js" type="text/javascript"></script-->

    <!-- jQuery OPTIMIZED FETCH FROM GOOGLE CDN ============================== -->
    <!--script src="http://ajax.googleapis.com/ajax/libs/jquery/1.4.2/jquery.min.js" type="text/javascript"></script-->

    <!-- AJAX and other stuff ================================================ -->
    <!--script src="js/carabana.js" type="text/javascript"></script-->
{% endcomment %}
  </head>

  <body>

    <div id="bg-top"><div id="bg-bottom">
      <div id="wrapper">

        <header>

          <!-- PAGE HEADER begin =========================================== --> 

          <div id="topnav">

            <div class="tab right">
              <a class="rss" href="http://feeds.feedburner.com/carabana" alt="rss"></a>
            </div>

          </div>

          <a id="carabana-logo-link" href="/">
          <div id="carabana-logo" href="http://www.carabana.cz/" alt="čarabaňa.cz">
            <div id="city"></div><div id="tube"></div><div id="village"></div><div id="sun"></div><div id="ofca"></div>
          </div>
          </a>

          <!-- PAGE HEADER end ============================================= --> 

        </header>

        <section id="content">
          <article>

          {% block article %}{% endblock article %}
          {% block booth %}{% endblock booth %}
          {% block gallery %}{% endblock gallery %}
          {% block columns %}{% endblock columns %}

            <div class="clear">&nbsp;</div>

          </article>
        </section>

        <footer>

          <!-- FOOTER begin ================================================ --> 

          <div class="ofca-xicht"></div>
          <div class="impress">
            <a href="/"><div class="carabana"></div></a>
            OFCA V SÍTI / Odpovědný vedoucí Martin Marek /<br/>Zabaleno do hřejivé vlny léta Páně 2012<br/>
            <div class="contacts">
              <a class="twitter" title="twitter" href="http://twitter.com/76house"></a>
              <a class="linkedin" title="linked in" href="http://cz.linkedin.com/in/martinmarek76"></a>
              <a class="flickr" title="flickr" href="http://www.flickr.com/photos/76house"></a>
              <a class="lastfm" title="last.fm" href="http://lastfm.com/user/a76house"></a>
              <a class="star" title="jagg" href="http://www.jagg.cz/bookmarks.php/76house"></a>
            </div>
          </div>
          <div class="clear">&nbsp;</div>

          <!-- FOOTER end ================================================== --> 

        </footer>

      </div>
    </div></div>

  </body>

</html>
